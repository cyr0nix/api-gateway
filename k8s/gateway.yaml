# Production Kubernetes manifests for the API Gateway.
# apply with: kubectl apply -f k8s/gateway.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  CORS_ORIGINS: "https://app.example.com"
  REDIS_MODE: "standalone"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RATE_LIMIT_WINDOW: "60"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_FAIL_MODE: "open"
  CACHE_TTL: "300"
  PROXY_TIMEOUT: "30000"
  PROXY_RETRIES: "1"
  CB_ERROR_THRESHOLD: "50"
  CB_RESET_TIMEOUT: "15000"
  USER_SERVICE_URL: "http://user-service:80"
  ORDER_SERVICE_URL: "http://order-service:80"
  PRODUCT_SERVICE_URL: "http://product-service:80"
  SHUTDOWN_TIMEOUT: "10000"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
type: Opaque
stringData:
  # replace with a real 32+ char secret (use a sealed-secret / vault in practice)
  JWT_SECRET: "REPLACE_WITH_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS"
  REDIS_PASSWORD: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      # give in-flight requests time to drain on rollout / scale-down
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api-gateway
          image: api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: api-gateway-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          # liveness: restart only if the process is truly wedged
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # readiness: pull out of the LB if redis/deps are unhealthy
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                # let the LB notice readiness flip before the process exits
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway
